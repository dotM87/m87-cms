name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            INPUT_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR=""

            if [ -n "$INPUT_DIR" ] && [ -d "$INPUT_DIR/.git" ]; then
              APP_DIR="$INPUT_DIR"
            fi

            if [ -z "$APP_DIR" ] && [ -d "$HOME/m87-cms/.git" ]; then
              APP_DIR="$HOME/m87-cms"
            fi

            if [ -z "$APP_DIR" ] && [ -d "$HOME/apps/m87-cms/.git" ]; then
              APP_DIR="$HOME/apps/m87-cms"
            fi

            if [ -z "$APP_DIR" ]; then
              echo "No se encontró un repo git válido para desplegar."
              echo "VPS_APP_DIR actual: '$INPUT_DIR'"
              echo "Rutas probadas: $HOME/m87-cms y $HOME/apps/m87-cms"
              echo "Contenido de HOME:"
              ls -la "$HOME"
              exit 1
            fi

            echo "Deploy en: $APP_DIR"

            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            if command -v corepack >/dev/null 2>&1; then
              corepack enable
            fi

            pnpm install --prod --frozen-lockfile
            pm2 startOrReload ecosystem.config.cjs --env production
            pm2 save
