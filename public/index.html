<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flat CMS</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="page-container site-header-inner">
      <a class="site-brand-title" href="/">m87 CMS</a>
      <p class="site-brand-sub">A Flat CMS build with NodeJS</p>
    </div>
  </header>

  <main class="page-container">
    <p class="page-subtitle home-intro">Destacado</p>

    <section id="featured"></section>
    <section id="posts" class="news-grid"></section>
  </main>

  <footer class="site-footer">
    <div class="page-container site-footer-inner site-footer-row">
      <p>Creado por m87 · m87-CMS © 2026</p>
      <button id="theme-toggle" class="theme-toggle-discreet" type="button">Cambiar tema</button>
    </div>
  </footer>

  <script type="module" src="/js/home.js"></script>
</body>
</html>
