<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <link rel="stylesheet" href="/style.css?v=20260303">
</head>
<body>
  <header class="site-header">
    <div class="page-container site-header-inner">
      <a class="site-brand-title" href="/">FlatCMS</a>
      <p class="site-brand-sub">Cine, ideas y relatos que dejan marca</p>
    </div>
  </header>

  <main class="page-container">
    <header class="page-header page-header--row">
      <a class="back-link" href="/">← Volver</a>
    </header>

    <article class="post-content">
      <header class="post-head">
        <h1 id="post-title"></h1>
        <p id="post-meta" class="meta-text"></p>
        <div id="post-tags" class="tags"></div>
      </header>
      <div id="post"></div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="page-container site-footer-inner site-footer-row">
      <p>Creado por m87 · FlatCMS © 2026</p>
      <button id="theme-toggle" class="theme-toggle-discreet" type="button">Cambiar tema</button>
    </div>
  </footer>

  <script type="module" src="/js/post.js?v=20260303"></script>
</body>
</html>
