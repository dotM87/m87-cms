<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page-container">
    <header class="page-header page-header--row">
      <div>
        <h1>Admin CMS</h1>
        <p class="page-subtitle">Gestiona publicaciones y contenido</p>
      </div>
      <button id="theme-toggle" class="btn btn-secondary" type="button">Cambiar tema</button>
    </header>

    <section id="login-panel" class="admin-panel hidden">
      <h2>Iniciar sesión</h2>
      <label class="form-label" for="username">Usuario</label>
      <input id="username" class="input" placeholder="admin" />
      <label class="form-label" for="password">Contraseña</label>
      <input id="password" class="input" type="password" placeholder="••••••" />
      <button id="login-btn" class="btn" type="button">Entrar</button>
      <p id="login-error" class="error-text"></p>
    </section>

    <section id="editor-panel" class="hidden">
      <div class="admin-toolbar">
        <button id="logout-btn" class="btn btn-secondary" type="button">Cerrar sesión</button>
      </div>
      <div class="admin-grid">
        <section class="admin-panel">
          <h2 id="editor-title">Nuevo post</h2>
          <label class="form-label" for="title">Título</label>
          <input id="title" class="input" placeholder="Título del post" />
          <label class="form-label" for="author">Autor</label>
          <input id="author" class="input" placeholder="Nombre del autor" />
          <label class="form-label" for="tags">Tags (coma)</label>
          <input id="tags" class="input" placeholder="nodejs, cms" />
          <label class="form-label" for="content">Contenido Markdown</label>
          <textarea id="content" rows="12" class="input" placeholder="Escribe aquí el markdown..."></textarea>
          <div class="upload-row">
            <input id="image-file" type="file" accept="image/*" class="input" />
            <button id="upload-btn" class="btn btn-secondary" type="button">Subir imagen</button>
          </div>
          <div class="editor-actions">
            <button id="save-btn" class="btn" type="button">Publicar</button>
            <button id="reset-btn" class="btn btn-secondary" type="button">Limpiar</button>
          </div>
          <p id="editor-message" class="info-text"></p>
        </section>
        <section class="admin-panel">
          <h2>Posts</h2>
          <div id="posts-list" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
